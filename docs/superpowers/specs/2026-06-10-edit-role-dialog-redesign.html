<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑角色 - 设计原型</title>
    <style>
        /* 设计系统变量 */
        :root {
            --bg-sidebar: rgb(246, 246, 246);
            --bg-shadow: rgb(234, 234, 234);
            --bg-main: rgb(255, 255, 255);
            --bg-bubble: rgb(246, 246, 246);
            --bg-input: rgb(255, 255, 255);
            --text-primary: rgb(30, 30, 30);
            --text-secondary: rgb(100, 100, 100);
            --text-tertiary: rgb(150, 150, 150);
            --border-color: rgb(220, 220, 220);
            --accent-color: rgb(74, 158, 255);
            --accent-hover: rgb(58, 140, 230);
            --accent-light: rgba(74, 158, 255, 0.1);
            --accent-shadow: rgba(74, 158, 255, 0.3);
            --success-color: rgb(34, 197, 94);
            --success-light: rgba(34, 197, 94, 0.1);
        }

        html[data-theme="dark"] {
            --bg-sidebar: rgb(20, 20, 20);
            --bg-shadow: rgb(38, 38, 38);
            --bg-main: rgb(24, 24, 24);
            --bg-bubble: rgb(20, 20, 20);
            --bg-input: rgb(45, 45, 45);
            --text-primary: rgb(230, 230, 230);
            --text-secondary: rgb(180, 180, 180);
            --text-tertiary: rgb(120, 120, 120);
            --border-color: rgb(60, 60, 60);
            --accent-color: rgb(74, 158, 255);
            --accent-hover: rgb(90, 170, 255);
            --accent-light: rgba(74, 158, 255, 0.15);
            --accent-shadow: rgba(74, 158, 255, 0.4);
            --success-color: rgb(34, 197, 94);
            --success-light: rgba(34, 197, 94, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-sidebar);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* 弹窗容器 */
        .dialog {
            background: var(--bg-main);
            border-radius: 16px;
            width: 520px;
            max-width: 90vw;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: dialog-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes dialog-in {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* 标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .header-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .closeBtn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .closeBtn:hover {
            background: var(--bg-shadow);
            color: var(--text-primary);
        }

        /* 内容区域 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 表单字段 */
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            line-height: 1.4;
        }

        .field-badge.required {
            background: var(--accent-light);
            color: var(--accent-color);
        }

        .field-badge.optional {
            background: var(--bg-shadow);
            color: var(--text-tertiary);
        }

        .field-hint {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 输入框 */
        .input {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-input);
            outline: none;
            transition: all 0.2s;
        }

        .input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-shadow);
        }

        .input::placeholder {
            color: var(--text-tertiary);
        }

        /* 文本域 */
        .textarea {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-input);
            outline: none;
            transition: all 0.2s;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
            line-height: 1.6;
        }

        .textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-shadow);
        }

        .textarea::placeholder {
            color: var(--text-tertiary);
        }

        /* 头像选择器 */
        .avatar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .avatar-item {
            aspect-ratio: 1;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        .avatar-item:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .avatar-item.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-shadow);
        }

        .avatar-item.selected::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-item.selected::before {
            content: '';
            position: absolute;
            top: 7px;
            right: 7px;
            width: 10px;
            height: 10px;
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(-45deg);
            z-index: 1;
        }

        .avatar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* 颜色选择器 */
        .color-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-item {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }

        .color-item:hover {
            transform: scale(1.1);
        }

        .color-item.selected {
            border-color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .color-item.selected::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            transform: translate(-50%, -60%) rotate(-45deg);
        }

        /* 预览区域 */
        .preview-section {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-bubble);
            border-radius: 12px;
        }

        .preview-avatar {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: var(--accent-color);
            color: white;
            flex-shrink: 0;
        }

        .preview-info {
            flex: 1;
        }

        .preview-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .preview-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* 操作栏 */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px 24px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
        }

        .cancel-btn,
        .submit-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-btn {
            background: var(--bg-bubble);
            color: var(--text-primary);
        }

        .cancel-btn:hover {
            background: var(--bg-shadow);
        }

        .submit-btn {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 12px var(--accent-shadow);
            min-width: 120px;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px var(--accent-shadow);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-shadow);
            transition: all 0.2s;
            z-index: 1001;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .dialog {
                width: 100%;
                max-height: 90vh;
                border-radius: 12px;
            }

            .avatar-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .actions {
                flex-direction: column;
            }

            .cancel-btn,
            .submit-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="this.style.display='none'">
        <div class="dialog" onclick="event.stopPropagation()">
            <!-- 标题栏 -->
            <div class="header">
                <div class="header-left">
                    <div class="header-icon">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="7" r="4"/>
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        </svg>
                    </div>
                    <div>
                        <h2>编辑角色</h2>
                        <div class="header-subtitle">自定义角色的名称、头像和描述</div>
                    </div>
                </div>
                <button class="closeBtn" onclick="this.closest('.overlay').style.display='none'">×</button>
            </div>

            <!-- 内容区域 -->
            <div class="content">
                <!-- 角色名称 -->
                <div class="field">
                    <label class="field-label">
                        角色名称
                        <span class="field-badge required">必填</span>
                    </label>
                    <input type="text" class="input" id="roleName" value="Agents-Hub-Assistant" placeholder="输入角色名称" oninput="updatePreview()">
                </div>

                <!-- 头像选择 -->
                <div class="avatar-section">
                    <label class="field-label">
                        选择头像
                        <span class="field-badge required">必填</span>
                    </label>
                    <div class="avatar-grid" id="avatarGrid">
                        <div class="avatar-item" onclick="selectAvatar(this, '🤖')" data-icon="🤖">
                            <div class="avatar-icon">🤖</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍💻')" data-icon="👨‍💻">
                            <div class="avatar-icon">👨‍💻</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍💻')" data-icon="👩‍💻">
                            <div class="avatar-icon">👩‍💻</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍🎨')" data-icon="👨‍🎨">
                            <div class="avatar-icon">👨‍🎨</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍🎨')" data-icon="👩‍🎨">
                            <div class="avatar-icon">👩‍🎨</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍🔬')" data-icon="👨‍🔬">
                            <div class="avatar-icon">👨‍🔬</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍🔬')" data-icon="👩‍🔬">
                            <div class="avatar-icon">👩‍🔬</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍🏫')" data-icon="👨‍🏫">
                            <div class="avatar-icon">👨‍🏫</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍🏫')" data-icon="👩‍🏫">
                            <div class="avatar-icon">👩‍🏫</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍💼')" data-icon="👨‍💼">
                            <div class="avatar-icon">👨‍💼</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍💼')" data-icon="👩‍💼">
                            <div class="avatar-icon">👩‍💼</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍🔧')" data-icon="👨‍🔧">
                            <div class="avatar-icon">👨‍🔧</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍🔧')" data-icon="👩‍🔧">
                            <div class="avatar-icon">👩‍🔧</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👨‍🚀')" data-icon="👨‍🚀">
                            <div class="avatar-icon">👨‍🚀</div>
                        </div>
                        <div class="avatar-item" onclick="selectAvatar(this, '👩‍🚀')" data-icon="👩‍🚀">
                            <div class="avatar-icon">👩‍🚀</div>
                        </div>
                    </div>
                </div>

                <!-- 角色描述 -->
                <div class="field">
                    <label class="field-label">
                        角色描述
                        <span class="field-badge optional">可选</span>
                    </label>
                    <textarea class="textarea" id="roleDesc" placeholder="描述角色的功能和职责..." oninput="updatePreview()">这是一个智能助手，可以帮助您完成各种任务。</textarea>
                    <span class="field-hint">描述将显示在角色卡片上，帮助用户了解角色功能</span>
                </div>

                <!-- 预览 -->
                <div class="preview-section">
                    <div class="preview-avatar" id="previewAvatar">🤖</div>
                    <div class="preview-info">
                        <div class="preview-name" id="previewName">Agents-Hub-Assistant</div>
                        <div class="preview-desc" id="previewDesc">这是一个智能助手，可以帮助您完成各种任务。</div>
                    </div>
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="actions">
                <button class="cancel-btn" onclick="this.closest('.overlay').style.display='none'">取消</button>
                <button class="submit-btn" id="submit-btn" onclick="saveRole()">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);

            const icon = document.getElementById('theme-icon');
            if (newTheme === 'dark') {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            }
        }

        // 选择头像
        let selectedAvatar = '🤖';

        function selectAvatar(item, icon) {
            // 移除其他选中状态
            document.querySelectorAll('.avatar-item').forEach(el => {
                el.classList.remove('selected');
            });

            // 选中当前项
            item.classList.add('selected');
            selectedAvatar = icon;

            // 更新预览
            updatePreview();
        }

        // 更新预览
        function updatePreview() {
            const name = document.getElementById('roleName').value;
            const desc = document.getElementById('roleDesc').value;

            document.getElementById('previewAvatar').textContent = selectedAvatar;
            document.getElementById('previewName').textContent = name || '未命名角色';
            document.getElementById('previewDesc').textContent = desc || '暂无描述';
        }

        // 保存角色
        function saveRole() {
            const name = document.getElementById('roleName').value.trim();

            if (!name) {
                alert('请输入角色名称');
                return;
            }

            // 模拟保存
            alert('角色已保存！');
            document.querySelector('.overlay').style.display = 'none';
        }

        // 初始化：选中第一个头像
        document.querySelector('.avatar-item').classList.add('selected');
    </script>
</body>
</html>
