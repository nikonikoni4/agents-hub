<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root {
    --ink: #1a1a1a;
    --ink-light: #555;
    --ink-muted: #888;
    --bg: #f8f6f1;
    --bg-card: #ffffff;
    --accent-1: #c04a1a;  /* 赤陶橙 */
    --accent-2: #2d6a4f;  /* 墨绿 */
    --accent-3: #1d3557;  /* 深蓝 */
    --accent-4: #7b2d8b;  /* 紫 */
    --accent-5: #b5651d;  /* 暖棕 */
    --border: #e0dcd4;
    --shadow: 0 2px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    font-size: 15px;
  }

  /* ===== HERO ===== */
  .hero {
    padding: 80px 40px 60px;
    text-align: center;
    max-width: 800px;
    margin: 0 auto;
  }
  .hero-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-1);
    border: 1px solid var(--accent-1);
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.25;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }
  .hero p {
    color: var(--ink-light);
    font-size: 16px;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.8;
  }

  /* ===== SECTION NAV ===== */
  .section-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 40px 48px;
    max-width: 900px;
    margin: 0 auto;
  }
  .section-nav a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
    background: var(--bg-card);
    transition: all 0.2s;
  }
  .section-nav a:hover {
    border-color: var(--accent-1);
    box-shadow: 0 2px 8px rgba(192,74,26,0.1);
  }

  /* ===== CONTENT SECTION ===== */
  .content-section {
    max-width: 1100px;
    margin: 0 auto 64px;
    padding: 0 40px;
  }
  .section-card {
    background: var(--bg-card);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .section-header {
    padding: 36px 40px 28px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    font-family: 'Noto Serif SC', serif;
  }
  .section-title-block h2 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .section-title-block .subtitle {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 400;
  }
  .section-body {
    padding: 32px 36px;
  }

  /* ===== CONTENT STYLES ===== */
  .desc {
    font-size: 14.5px;
    color: var(--ink-light);
    margin-bottom: 24px;
    line-height: 1.85;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .info-block {
    padding: 14px 16px;
    border-radius: 6px;
    border-left: 3px solid;
  }
  .info-block h4 {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .info-block ul {
    list-style: none;
    padding: 0;
  }
  .info-block li {
    font-size: 14px;
    line-height: 1.6;
    padding: 4px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .info-block li:last-child { border-bottom: none; }

  /* Color variants for info blocks */
  .info-block.blue {
    background: #e3f2fd;
    border-color: #42a5f5;
  }
  .info-block.blue h4 { color: #1565c0; }

  .info-block.green {
    background: #e8f5e9;
    border-color: #4caf50;
  }
  .info-block.green h4 { color: #2e7d32; }

  .info-block.purple {
    background: #f3e5f5;
    border-color: #ab47bc;
  }
  .info-block.purple h4 { color: #7b1fa2; }

  .info-block.orange {
    background: #fff3e0;
    border-color: #ff9800;
  }
  .info-block.orange h4 { color: #e65100; }

  /* ===== DIAGRAM SECTION ===== */
  .diagram-section {
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafaf7;
    border-radius: 8px;
    margin: 20px 0;
  }

  /* ===== TABLE STYLES ===== */
  .styled-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14px;
  }
  .styled-table th {
    background: var(--accent-3);
    color: white;
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
  }
  .styled-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .styled-table tr:nth-child(even) {
    background: #fafaf7;
  }

  /* ===== MERMAID ===== */
  .mermaid {
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .hero { padding: 60px 20px 40px; }
    .content-section { padding: 0 20px; }
    .section-header { padding: 24px 20px 20px; }
    .section-body { padding: 20px; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">{{BADGE}}</div>
  <h1>{{TITLE}}</h1>
  <p>{{SUBTITLE}}</p>
</div>

<nav class="section-nav">
  {{NAV_ITEMS}}
</nav>

{{CONTENT}}

<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'default',
    flowchart: {
      useMaxWidth: true,
      htmlLabels: true,
      curve: 'basis'
    }
  });
</script>

</body>
</html>
