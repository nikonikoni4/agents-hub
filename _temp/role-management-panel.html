const avatarColors = [
  '#4A9EFF', '#FF6B6B', '#51CF66', '#FCC419',

  '#20C997', '#BE4BDB', '#FD7E14', '#339AF0',

function getAvatarColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return avatarColors[Math.abs(hash) % avatarColors.length];
}

function getInitials(name) {
  const parts = name.split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0, 2).toUpperCase();
}

/* ─── Avatar Component ─── */
function Avatar({ name, size = 36, avatarUrl }) {
  const color = getAvatarColor(name);
  const initials = getInitials(name);
  return (
    <div style={{
      width: size,
      height: size,
      minWidth: size,
      borderRadius: '50%',
      background: color,
      display: 'flex',

      fontSize: size * 0.36,
      fontWeight: 600,
      color: '#fff',
      letterSpacing: '0.5px',
      userSelect: 'none',
    }}>
      {initials}
    </div>
  );
}

/* ─── Badge Component ─── */
function Badge({ children, variant = 'default' }) {
  const variants = {
    default: { bg: 'var(--accent-bg)', color: 'var(--accent-color)', border: 'transparent' },
    admin: { bg: 'rgba(255, 107, 107, 0.1)', color: '#FF6B6B', border: 'transparent' },
    member: { bg: 'var(--accent-bg)', color: 'var(--accent-color)', border: 'transparent' },
    skill: { bg: 'var(--bg-sidebar)', color: 'var(--text-secondary)', border: 'var(--border-color)' },
  };
  const v = variants[variant] || variants.default;
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      padding: '2px 8px',
      borderRadius: 4,
      fontSize: 11,
      fontWeight: 600,
      background: v.bg,
      color: v.color,
      border: `1px solid ${v.border}`,
      lineHeight: '18px',
      whiteSpace: 'nowrap',
    }}>
      {children}
    </span>
  );
}

      onMouseLeave={e => {

        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

          overflow: 'hidden',

          whiteSpace: 'nowrap',

            </div>
          </div>

          {/* Description */}
          <div style={{
            fontSize: 12,
            color: 'var(--text-secondary)',
            lineHeight: 1.6,
            marginBottom: 12,
          }}>
            {role.description}
          </div>

          {/* Skills */}
          <div style={{ paddingTop: 12, borderTop: '1px solid var(--border-color)' }}>
            <div style={{
              fontSize: 11,
              fontWeight: 600,
              color: 'var(--text-tertiary)',
              textTransform: 'uppercase',
              letterSpacing: '0.5px',
              marginBottom: 8,
            }}>
              Skills
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {role.skills.map(skill => (
                <Badge key={skill} variant="skill">{skill}</Badge>
              ))}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [activeTab, setActiveTab] = useState('teams');
  const [theme, setTheme] = useState('light');

  const toggleTheme = () => {
    const next = theme === 'light' ? 'dark' : 'light';
    setTheme(next);
    document.documentElement.setAttribute('data-theme', next);
  };

  return (
    <div style={containerStyles}>
      {/* Header */}
      <div style={headerStyles}>
        <h2 style={{ fontSize: 15, fontWeight: 600, color: 'var(--text-primary)' }}>
          角色管理
        </h2>

        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {/* Tab Switcher */}
          <div style={tabContainerStyles}>
            <button
              onClick={() => setActiveTab('teams')}
              style={{
                ...tabBtnBase,
                background: activeTab === 'teams' ? 'var(--bg-main)' : 'transparent',
                color: activeTab === 'teams' ? 'var(--text-primary)' : 'var(--text-secondary)',
                boxShadow: activeTab === 'teams' ? 'var(--shadow-sm)' : 'none',
              }}
            >
              <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                团队管理
              </span>
            </button>
            <button
              onClick={() => setActiveTab('roles')}
              style={{
                ...tabBtnBase,
                background: activeTab === 'roles' ? 'var(--bg-main)' : 'transparent',
                color: activeTab === 'roles' ? 'var(--text-primary)' : 'var(--text-secondary)',
                boxShadow: activeTab === 'roles' ? 'var(--shadow-sm)' : 'none',
              }}
            >
              <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="7" r="4"/>
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                </svg>
                角色管理
              </span>
            </button>
          </div>

          {/* Theme Toggle */}
          <button onClick={toggleTheme} style={themeToggleBtn} title="切换主题">
            {theme === 'light' ? (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            ) : (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            )}
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{
        ...contentStyles,
        overflow: activeTab === 'teams' ? 'hidden' : 'auto',
      }}>
        {activeTab === 'teams' ? <TeamPanel /> : <RolePanel />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
