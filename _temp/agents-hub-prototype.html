<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents Hub - Claude Code Style Prototype</title>
  <style>
    /*
      ASSUMPTIONS & REASONING:
      - 深色主题模仿 Claude Code Desktop 的专业开发者美学
      - 三栏布局：侧边栏（会话）+ 主区（统计/内容）+ 底栏（输入）
      - 色彩：#1a1a1a 背景 + #2a2a2a 卡片 + #4a9eff accent
      - 字体：系统字体栈保持原生感
      - 留白克制，信息密度适中
    */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* 侧边栏 */
    .sidebar {
      width: 280px;
      background: #0d0d0d;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 8px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%);
      border-radius: 6px;
    }

    .app-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }

    .new-session-btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .new-session-btn:hover {
      background: #333333;
    }

    .section-title {
      font-size: 12px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 16px 0 8px 8px;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
    }

    .session-item {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      color: #b0b0b0;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .session-item:hover {
      background: #1a1a1a;
    }

    .session-item.active {
      background: #2a2a2a;
      color: #ffffff;
    }

    .session-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4a9eff;
      opacity: 0;
    }

    .session-item.active .session-dot {
      opacity: 1;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 24px 32px;
      border-bottom: 1px solid #2a2a2a;
    }

    .content-title {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
      border-radius: 8px;
    }

    .content-body {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-avatar {
      background: #4a9eff;
      color: #ffffff;
    }

    .assistant-avatar {
      background: #2a2a2a;
      color: #4a9eff;
      border: 1px solid #3a3a3a;
    }

    .message-content {
      flex: 1;
      max-width: 720px;
    }

    .message-text {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 16px 20px;
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.6;
    }

    .user-message .message-text {
      background: #1a2332;
      border-color: #2a3a4a;
    }

    .message-text p {
      margin: 0 0 12px 0;
    }

    .message-text p:last-child {
      margin-bottom: 0;
    }

    .message-text ol {
      margin: 8px 0 0 20px;
      padding: 0;
    }

    .message-text li {
      margin: 6px 0;
      color: #b0b0b0;
    }

    /* 底部输入区 */
    .input-container {
      padding: 16px 32px;
      border-top: 1px solid #2a2a2a;
      background: #0d0d0d;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #4a9eff;
    }

    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    .input-field::placeholder {
      color: #666666;
    }

    .send-btn {
      background: #4a9eff;
      border: none;
      color: #ffffff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .send-btn:hover {
      background: #357abd;
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo"></div>
        <span class="app-title">Agents Hub</span>
      </div>

      <button class="new-session-btn">
        <span>+</span>
        <span>New Session</span>
      </button>

      <div class="section-title">Pinned</div>
      <div class="session-list">
        <div class="session-item active">
          <span class="session-dot"></span>
          <span>错误处理</span>
        </div>

        <div class="section-title">Recents</div>
        <div class="session-item">
          <span class="session-dot"></span>
          <span>General coding session</span>
        </div>
        <div class="session-item">
          <span class="session-dot"></span>
          <span>MCP tool design</span>
        </div>
        <div class="session-item">
          <span class="session-dot"></span>
          <span>学习单元测试</span>
        </div>
        <div class="session-item">
          <span class="session-dot"></span>
          <span>Settings module design</span>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="content-header">
        <h1 class="content-title">
          <div class="title-icon"></div>
          <span>What's up next?</span>
        </h1>
      </header>

      <div class="content-body">
        <!-- 对话消息区域 -->
        <div class="messages-container">
          <div class="message user-message">
            <div class="message-avatar user-avatar">U</div>
            <div class="message-content">
              <div class="message-text">帮我设计一个多 Agent 协作系统</div>
            </div>
          </div>

          <div class="message assistant-message">
            <div class="message-avatar assistant-avatar">A</div>
            <div class="message-content">
              <div class="message-text">
                <p>好的，我来帮你设计一个多 Agent 协作系统。首先让我了解一下你的需求：</p>
                <ol>
                  <li>这个系统主要用于什么场景？</li>
                  <li>需要支持多少个 Agent 同时协作？</li>
                  <li>Agent 之间的通信方式有什么要求？</li>
                </ol>
              </div>
            </div>
          </div>

          <div class="message user-message">
            <div class="message-avatar user-avatar">U</div>
            <div class="message-content">
              <div class="message-text">用于代码生成和测试，需要支持 3-5 个 Agent</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 底部输入 -->
      <div class="input-container">
        <div class="input-wrapper">
          <input
            type="text"
            class="input-field"
            placeholder="Describe a task or ask a question"
          />
          <button class="send-btn">Send</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
